# Server A — IPsec site-to-site connection
#
# Deploy to: /etc/ipsec.d/site-to-site.conf
#
# Replace A.A.A.A with this server's public IP
# Replace B.B.B.B with the remote server's public IP
# Adjust leftsubnet/rightsubnet to match your private networks

config setup

conn site-to-site
    left=A.A.A.A
    leftsubnet=192.168.1.0/24
    right=B.B.B.B
    rightsubnet=192.168.2.0/24
    authby=secret
    auto=start
    type=tunnel
    ike=aes256-sha2_256-modp2048
    esp=aes256-sha2_256
