# Server B — IPsec host-to-host connection
#
# Deploy to: /etc/ipsec.d/site-to-site.conf
#
# Replace B.B.B.B with this server's IP
# Replace A.A.A.A with the remote server's IP
#
# For site-to-site (subnet-to-subnet) tunnels, add:
#     leftsubnet=<local_subnet>    e.g., 192.168.2.0/24
#     rightsubnet=<remote_subnet>  e.g., 192.168.1.0/24
#
# Full parameter reference: docs/CONFIG_PARAMETERS.md

config setup

conn site-to-site
    left=B.B.B.B
    right=A.A.A.A
    authby=secret
    auto=start
    type=tunnel
    ike=aes256-sha2_256-modp2048
    esp=aes256-sha2_256
